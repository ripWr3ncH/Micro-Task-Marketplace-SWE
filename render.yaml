services:
  - type: web
    name: microtask-marketplace
    env: docker
    plan: free
    autoDeploy: true
    envVars:
      - key: SPRING_DATASOURCE_URL
        value: jdbc:postgresql://<YOUR_RENDER_DB_HOST>:5432/<YOUR_RENDER_DB_NAME>
      - key: SPRING_DATASOURCE_USERNAME
        value: <YOUR_RENDER_DB_USER>
      - key: SPRING_DATASOURCE_PASSWORD
        value: <YOUR_RENDER_DB_PASSWORD>
      - key: APP_SECURITY_JWT_SECRET
        value: <BASE64_256_BIT_SECRET>
      - key: APP_SECURITY_JWT_EXPIRATION_MS
        value: "86400000"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
