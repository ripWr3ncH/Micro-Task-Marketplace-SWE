databases:
  - name: microtask-marketplace-db
    plan: free
    databaseName: microtask
    user: microtask

services:
  - type: web
    name: microtask-marketplace
    env: docker
    plan: free
    autoDeploy: true
    branch: main
    envVars:
      - key: SPRING_DATASOURCE_URL
        fromDatabase:
          name: microtask-marketplace-db
          property: connectionString
      - key: SPRING_DATASOURCE_USERNAME
        fromDatabase:
          name: microtask-marketplace-db
          property: user
      - key: SPRING_DATASOURCE_PASSWORD
        fromDatabase:
          name: microtask-marketplace-db
          property: password
      - key: APP_SECURITY_JWT_SECRET
        sync: false
      - key: APP_SECURITY_JWT_EXPIRATION_MS
        value: "86400000"
      - key: SPRING_JPA_HIBERNATE_DDL_AUTO
        value: update
