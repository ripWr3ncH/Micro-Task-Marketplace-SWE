services:
  postgres:
    image: postgres:16
    container_name: microtask-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: microtask_db
      POSTGRES_USER: microtask_user
      POSTGRES_PASSWORD: microtask_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microtask_user -d microtask_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: microtask-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/microtask_db
      SPRING_DATASOURCE_USERNAME: microtask_user
      SPRING_DATASOURCE_PASSWORD: microtask_pass
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SERVER_PORT: 8081
    ports:
      - "8081:8081"

volumes:
  postgres_data:
