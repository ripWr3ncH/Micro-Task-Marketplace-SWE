spring.application.name=microtask-marketplace

# PostgreSQL datasource (Docker-friendly defaults)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/microtask_db}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:microtask_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:microtask_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${SPRING_JPA_FORMAT_SQL:true}

# Server
server.port=${SERVER_PORT:8081}

# JWT
app.security.jwt.secret=${APP_SECURITY_JWT_SECRET:TXljcm90YXNrTWFya2V0cGxhY2VTZWNyZXRLZXlGb3JKV1QxMjM0NTY3ODkwMTIzNDU2Nzg5MDEyMzQ=}
app.security.jwt.expiration-ms=${APP_SECURITY_JWT_EXPIRATION_MS:86400000}

# Admin bootstrap (recommended only for controlled environments)
app.bootstrap.admin.enabled=${APP_BOOTSTRAP_ADMIN_ENABLED:false}
app.bootstrap.admin.email=${APP_BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${APP_BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.full-name=${APP_BOOTSTRAP_ADMIN_FULL_NAME:System Admin}
