<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Micro Task Marketplace | Minimal UI</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
<main class="page">
    <header class="hero">
        <h1>Micro Task Marketplace</h1>
        <p>Minimal test UI for auth, task workflow, and application flow.</p>
        <div class="session-box">
            <p class="session-title">Session Profiles</p>
            <div class="session-meta">
                <span id="buyer-token-state" class="badge">Buyer token: missing</span>
                <span id="seller-token-state" class="badge">Seller token: missing</span>
            </div>
            <div class="button-row">
                <button id="use-buyer-token" type="button">Use Buyer Token</button>
                <button id="use-seller-token" type="button" class="ghost">Use Seller Token</button>
            </div>
        </div>
        <div class="token-box">
            <label for="token">JWT Token</label>
            <textarea id="token" placeholder="Login first, token will appear here"></textarea>
            <div class="button-row">
                <button id="save-token" type="button">Save Token</button>
                <button id="clear-token" type="button" class="ghost">Clear Token</button>
            </div>
        </div>
    </header>

    <section class="grid">
        <article class="card">
            <h2>Register</h2>
            <form id="register-form">
                <input id="register-name" type="text" placeholder="Full Name" required />
                <input id="register-email" type="email" placeholder="Email" required />
                <input id="register-password" type="password" placeholder="Password" required />
                <select id="register-role">
                    <option value="BUYER">BUYER</option>
                    <option value="SELLER">SELLER</option>
                    <option value="ADMIN">ADMIN</option>
                </select>
                <button type="submit">Register</button>
            </form>
        </article>

        <article class="card">
            <h2>Login</h2>
            <form id="login-form">
                <input id="login-email" type="email" placeholder="Email" required />
                <input id="login-password" type="password" placeholder="Password" required />
                <button type="submit">Login</button>
            </form>
        </article>

        <article class="card">
            <h2>Create Task</h2>
            <form id="task-form">
                <input id="task-title" type="text" placeholder="Task Title" required />
                <textarea id="task-description" placeholder="Task Description" required></textarea>
                <input id="task-budget" type="number" min="1" step="0.01" placeholder="Budget" required />
                <button type="submit">Create Task</button>
            </form>
        </article>

        <article class="card">
            <h2>Apply to Task</h2>
            <form id="apply-form">
                <input id="apply-task-id" type="number" min="1" placeholder="Task ID" required />
                <input id="apply-amount" type="number" min="1" step="0.01" placeholder="Proposed Amount" required />
                <textarea id="apply-cover" placeholder="Cover Letter" required></textarea>
                <button type="submit">Apply</button>
            </form>
        </article>

        <article class="card">
            <h2>Accept Application</h2>
            <form id="accept-form">
                <input id="accept-application-id" type="number" min="1" placeholder="Application ID" required />
                <button type="submit">Accept</button>
            </form>
        </article>

        <article class="card">
            <h2>Quick Fetch</h2>
            <div class="button-row">
                <button id="fetch-tasks" type="button">Get All Tasks</button>
                <button id="fetch-task-apps" type="button" class="ghost">Get Apps by Task</button>
            </div>
            <input id="fetch-task-id" type="number" min="1" placeholder="Task ID (for applications)" />
        </article>
    </section>

    <section class="response-card">
        <h2>Response</h2>
        <pre id="response">Ready.</pre>
    </section>
</main>

<script src="/js/app.js"></script>
</body>
</html>
