<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | Micro Task Marketplace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;800&family=Manrope:wght@700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body class="mtm-auth">
  <main class="mtm-auth-card">
    <div class="mtm-brand">
      <h1>Micro Task Marketplace</h1>
      <p>Sign in to create, apply, and manage tasks.</p>
    </div>

    <div id="login-error-box" class="mtm-error">
      <span id="login-error-text"></span>
    </div>

    <div id="page-alert" class="mtm-alert" style="margin-top:0.8rem;"></div>

    <form id="login-form" class="mtm-form" novalidate>
      <label for="login-email">Email</label>
      <input class="mtm-input" id="login-email" name="email" type="email" autocomplete="email" required />

      <label for="login-password">Password</label>
      <input class="mtm-input" id="login-password" name="password" type="password" autocomplete="current-password" required />

      <button class="mtm-btn" type="submit">Sign In</button>
    </form>

    <p class="mtm-helper">No account yet? <a href="/signup.html">Create one</a></p>
    <details id="action-details" class="mtm-details" hidden>
      <summary>Technical details</summary>
      <pre id="action-status" class="mtm-status"></pre>
    </details>
  </main>
  <script src="/js/app.js" defer></script>
</body>
</html>
